<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>EDN - Worklog Timer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    :root {
      --primary: #0052CC;
      --bg: #0f172a;
      --card: rgba(255, 255, 255, 0.08);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --success: #22c55e;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #020617, #0f172a);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    /* ===== WELCOME ===== */
    #welcome {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #020617, #0f172a);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      animation: fadeOut 1s ease forwards;
      animation-delay: 2.8s;
    }

    .welcome-card { text-align: center; }

    .loader {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: var(--primary);
      margin: 20px auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }

    /* ===== CARD ===== */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      backdrop-filter: blur(18px);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 30px 60px rgba(0,0,0,.5);
      opacity: 0;
      transform: translateY(20px);
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.6s ease;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.6rem;
      text-align: center;
    }

    p.subtitle {
      margin: 0 0 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    input, textarea {
      width: 100%;
      margin-top: 6px;
      margin-bottom: 8px;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.12);
      color: var(--text);
      font-size: 0.95rem;
    }

    textarea {
      resize: none;
      height: 70px;
      margin-bottom: 18px;
    }

    .timer {
      text-align: center;
      font-size: 2.4rem;
      font-weight: bold;
      margin: 12px 0 22px;
      letter-spacing: 1px;
    }

    .buttons {
      display: flex;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
    }

    button.start {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    button.stop {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 6px;
      font-size: 0.85rem;
      text-align: center;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }

    /* ===== FEEDBACK ===== */
    #feedback {
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .feedback-box {
      background: var(--card);
      backdrop-filter: blur(18px);
      border-radius: 20px;
      padding: 28px;
      width: 320px;
      text-align: center;
      animation: scaleIn .35s ease;
    }

    .feedback-box.success h2 { color: var(--success); }
    .feedback-box.error h2 { color: var(--danger); }

    .feedback-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    @keyframes scaleIn {
      from { transform: scale(.92); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>

<div id="welcome">
  <div class="welcome-card">
    <h2>EDN - Worklog Timer</h2>
    <div class="loader"></div>
    <small>Conectando ao Jira...</small>
  </div>
</div>

<div id="feedback">
  <div class="feedback-box" id="feedbackBox">
    <div class="feedback-icon" id="feedbackIcon"></div>
    <h2 id="feedbackTitle"></h2>
    <p id="feedbackText"></p>
    <button id="feedbackBtn" class="start" onclick="closeFeedback()">OK</button>
  </div>
</div>

<div class="card" id="app">
  <h1>EDN - Worklog Timer</h1>
  <p class="subtitle">Logado como {{ user_name }} {{ user_email }}</p>

  <label>Issue</label>
  <input id="issue" placeholder="EDN-123" oninput="debouncedValidate()" />
  <div id="issueStatus" class="status"></div>

  <div class="timer" id="timer">00:00:00</div>

  <div class="buttons">
    <button class="start" id="startBtn" onclick="startTimer()" disabled>▶ Start</button>
    <button class="stop" id="stopBtn" onclick="stopTimer()" disabled>■ Stop</button>
  </div>

  <label>Comentário (opcional)</label>
  <textarea id="comment" placeholder="O que foi feito?"></textarea>
</div>

<script>
let startTime = null;
let interval = null;
let debounceTimer = null;

window.onload = () => {
  setTimeout(() => {
    welcome.remove();
    app.classList.add("show");
  }, 2800);
};

function formatClock(seconds) {
  const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
  const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function formatHuman(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  if (h && m) return `${h}h ${m}m`;
  if (h) return `${h}h`;
  if (m) return `${m}m`;
  return `${seconds}s`;
}

function resetApp() {
  timer.innerText = "00:00:00";
  comment.value = "";
  issue.value = "";
  issueStatus.innerText = "";
  startBtn.disabled = true;
}

function showFeedback(type, title, text) {
  feedback.style.display = "flex";
  feedbackBox.className = "feedback-box " + type;
  feedbackIcon.innerText = type === "success" ? "✔️" : "❌";
  feedbackTitle.innerText = title;
  feedbackText.innerText = text;
}

function closeFeedback() {
  feedback.style.display = "none";
  resetApp();
}

function debouncedValidate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(validateIssue, 600);
}

function validateIssue() {
  fetch("/validate-issue", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ issue: issue.value.toUpperCase() })
  })
  .then(r => r.json())
  .then(d => {
    issueStatus.innerText = d.valid
      ? `✔ ${d.key} — ${d.summary} (${d.status})`
      : `❌ ${d.error}`;
    issueStatus.className = "status " + (d.valid ? "success" : "error");
    startBtn.disabled = !d.valid;
  });
}

function startTimer() {
  fetch("/start", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ issue: issue.value })
  });

  startTime = Date.now();
  interval = setInterval(() => {
    const seconds = Math.floor((Date.now() - startTime) / 1000);
    timer.innerText = formatClock(seconds);
  }, 1000);

  startBtn.disabled = true;
  stopBtn.disabled = false;
}

function stopTimer() {
  clearInterval(interval);
  const seconds = Math.floor((Date.now() - startTime) / 1000);
  const human = formatHuman(seconds);

  fetch("/stop", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ comment: comment.value })
  })
  .then(r => r.json())
  .then(d => {
    if (d.seconds && d.seconds > 59) {
      showFeedback(
        "success",
        "Registro inserido com sucesso",
        `Tempo registrado: ${human}`
      );
    } else {
      showFeedback(
        "error",
        "Erro ao registrar",
        `Tempo insuficiente para registrar na issue`
      );
    }
  })
  .catch(() => {
    showFeedback(
      "error",
      "Erro ao registrar",
      `Tempo insuficiente para registrar na issue`
    );
  });

  startBtn.disabled = false;
  stopBtn.disabled = true;
}
</script>

</body>
</html>
